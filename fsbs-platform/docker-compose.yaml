      FSBS_LISTEN_PORT: "4317"
      FSBS_HTTP_PORT: "8083"
      FSBS_FORWARD_ENDPOINT: "otel-collector:4317"
      FSBS_ALPHA: "1.0"
      FSBS_THRESHOLD: "0.2"
      FSBS_CONFIDENCE_THRESHOLD: "10"
      FSBS_LOG_LEVEL: "INFO"
      FSBS_CHECKPOINT_DIR: "/data/checkpoints"
      FSBS_CHECKPOINT_INTERVAL: "60"
    ports:
      - "8083:8083"
    volumes:
      - fsbs-checkpoint-productcatalog:/data/checkpoints
    depends_on:
      - otel-collector
    mem_limit: 64m

  fsbs-sidecar-currencyservice:
    build:
      context: ./sidecar
      dockerfile: Dockerfile
    container_name: fsbs-sidecar-currencyservice
    restart: unless-stopped
    environment:
      FSBS_SERVICE_NAME: "currencyservice"
      FSBS_LISTEN_PORT: "4317"
      FSBS_HTTP_PORT: "8084"
      FSBS_FORWARD_ENDPOINT: "otel-collector:4317"
      FSBS_ALPHA: "1.0"
      FSBS_THRESHOLD: "0.2"
      FSBS_CONFIDENCE_THRESHOLD: "10"
      FSBS_LOG_LEVEL: "INFO"
      FSBS_CHECKPOINT_DIR: "/data/checkpoints"
      FSBS_CHECKPOINT_INTERVAL: "60"
    ports:
      - "8084:8084"
    volumes:
      - fsbs-checkpoint-currency:/data/checkpoints
    depends_on:
      - otel-collector
    mem_limit: 64m

  fsbs-sidecar-paymentservice:
    build:
      context: ./sidecar
      dockerfile: Dockerfile
    container_name: fsbs-sidecar-paymentservice
    restart: unless-stopped
    environment:
      FSBS_SERVICE_NAME: "paymentservice"
      FSBS_LISTEN_PORT: "4317"
      FSBS_HTTP_PORT: "8085"
      FSBS_FORWARD_ENDPOINT: "otel-collector:4317"
      FSBS_ALPHA: "1.0"
      FSBS_THRESHOLD: "0.2"
      FSBS_CONFIDENCE_THRESHOLD: "10"
      FSBS_LOG_LEVEL: "INFO"
      FSBS_CHECKPOINT_DIR: "/data/checkpoints"
      FSBS_CHECKPOINT_INTERVAL: "60"
    ports:
      - "8085:8085"
    volumes:
      - fsbs-checkpoint-payment:/data/checkpoints
    depends_on:
      - otel-collector
    mem_limit: 64m

  fsbs-sidecar-shippingservice:
    build:
      context: ./sidecar
      dockerfile: Dockerfile
    container_name: fsbs-sidecar-shippingservice
    restart: unless-stopped
    environment:
