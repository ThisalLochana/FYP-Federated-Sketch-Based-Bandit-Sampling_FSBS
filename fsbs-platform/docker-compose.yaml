    depends_on:
      - otel-collector
    mem_limit: 64m

  fsbs-sidecar-emailservice:
    build:
      context: ./sidecar
      dockerfile: Dockerfile
    container_name: fsbs-sidecar-emailservice
    restart: unless-stopped
    environment:
      FSBS_SERVICE_NAME: "emailservice"
      FSBS_LISTEN_PORT: "4317"
      FSBS_HTTP_PORT: "8087"
      FSBS_FORWARD_ENDPOINT: "otel-collector:4317"
      FSBS_ALPHA: "1.0"
      FSBS_THRESHOLD: "0.2"
      FSBS_CONFIDENCE_THRESHOLD: "10"
      FSBS_LOG_LEVEL: "INFO"
      FSBS_CHECKPOINT_DIR: "/data/checkpoints"
      FSBS_CHECKPOINT_INTERVAL: "60"
    ports:
      - "8087:8087"
    volumes:
      - fsbs-checkpoint-email:/data/checkpoints
    depends_on:
      - otel-collector
    mem_limit: 64m

  fsbs-sidecar-cartservice:
    build:
      context: ./sidecar
      dockerfile: Dockerfile
    container_name: fsbs-sidecar-cartservice
    restart: unless-stopped
    environment:
      FSBS_SERVICE_NAME: "cartservice"
      FSBS_LISTEN_PORT: "4317"
      FSBS_HTTP_PORT: "8088"
      FSBS_FORWARD_ENDPOINT: "otel-collector:4317"
      FSBS_ALPHA: "1.0"
      FSBS_THRESHOLD: "0.2"
      FSBS_CONFIDENCE_THRESHOLD: "10"
      FSBS_LOG_LEVEL: "INFO"
      FSBS_CHECKPOINT_DIR: "/data/checkpoints"
      FSBS_CHECKPOINT_INTERVAL: "60"
    ports:
      - "8088:8088"
    volumes:
      - fsbs-checkpoint-cart:/data/checkpoints
    depends_on:
      - otel-collector
    mem_limit: 64m

  fsbs-sidecar-recommendationservice:
    build:
      context: ./sidecar
      dockerfile: Dockerfile
    container_name: fsbs-sidecar-recommendationservice
    restart: unless-stopped
    environment:
      FSBS_SERVICE_NAME: "recommendationservice"
      FSBS_LISTEN_PORT: "4317"
      FSBS_HTTP_PORT: "8089"
      FSBS_FORWARD_ENDPOINT: "otel-collector:4317"
      FSBS_ALPHA: "1.0"
      FSBS_THRESHOLD: "0.2"
      FSBS_CONFIDENCE_THRESHOLD: "10"
      FSBS_LOG_LEVEL: "INFO"
      FSBS_CHECKPOINT_DIR: "/data/checkpoints"
      FSBS_CHECKPOINT_INTERVAL: "60"
    ports:
      - "8089:8089"
    volumes:
      - fsbs-checkpoint-recommendation:/data/checkpoints
    depends_on:
