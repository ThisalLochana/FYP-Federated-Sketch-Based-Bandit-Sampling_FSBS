      dockerfile: Dockerfile
    container_name: fsbs-sidecar-adservice
    restart: unless-stopped
    environment:
      FSBS_SERVICE_NAME: "adservice"
      FSBS_LISTEN_PORT: "4317"
      FSBS_HTTP_PORT: "8090"
      FSBS_FORWARD_ENDPOINT: "otel-collector:4317"
      FSBS_ALPHA: "1.0"
      FSBS_THRESHOLD: "0.2"
      FSBS_CONFIDENCE_THRESHOLD: "10"
      FSBS_LOG_LEVEL: "INFO"
      FSBS_CHECKPOINT_DIR: "/data/checkpoints"
      FSBS_CHECKPOINT_INTERVAL: "60"
    ports:
      - "8090:8090"
    volumes:
      - fsbs-checkpoint-ad:/data/checkpoints
    depends_on:
