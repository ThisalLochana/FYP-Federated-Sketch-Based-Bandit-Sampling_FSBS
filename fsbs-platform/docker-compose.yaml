# docker-compose.yaml — Phase 3: FSBS Sidecar in the pipeline
# Microservices → FSBS Sidecar → OTel Collector → Jaeger

services:

  # ============================================================
  # INFRASTRUCTURE
  # ============================================================

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    container_name: jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"
      - "4317"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - LOG_LEVEL=info
    mem_limit: 512m

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    container_name: otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-config/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4318:4318"
    depends_on:
      - jaeger
    mem_limit: 256m

  redis-cart:
    image: redis:7.4-alpine
    container_name: redis-cart
    restart: unless-stopped
    ports:
      - "6379"
    mem_limit: 128m

  # ============================================================
  # FSBS SIDECARS — the intelligent sampling engines          ← NEW
  # ============================================================
  
  fsbs-sidecar-frontend:
    build:
      context: ./sidecar
      dockerfile: Dockerfile
    container_name: fsbs-sidecar-frontend
    restart: unless-stopped
    environment:
      FSBS_SERVICE_NAME: "frontend"
      FSBS_LISTEN_PORT: "4317"
      FSBS_HTTP_PORT: "8081"
      FSBS_FORWARD_ENDPOINT: "otel-collector:4317"
      FSBS_ALPHA: "1.0"
      FSBS_THRESHOLD: "0.2"
      FSBS_CONFIDENCE_THRESHOLD: "10"
      FSBS_LOG_LEVEL: "INFO"
      FSBS_CHECKPOINT_DIR: "/data/checkpoints"
      FSBS_CHECKPOINT_INTERVAL: "60"
    ports:
      - "8081:8081"
    volumes:
      - fsbs-checkpoint-frontend:/data/checkpoints
    depends_on:
      - otel-collector
    mem_limit: 64m

  fsbs-sidecar-checkoutservice:
    build:
      context: ./sidecar
      dockerfile: Dockerfile
    container_name: fsbs-sidecar-checkoutservice
    restart: unless-stopped
    environment:
      FSBS_SERVICE_NAME: "checkoutservice"
      FSBS_LISTEN_PORT: "4317"
      FSBS_HTTP_PORT: "8082"
      FSBS_FORWARD_ENDPOINT: "otel-collector:4317"
      FSBS_ALPHA: "1.0"
      FSBS_THRESHOLD: "0.2"
      FSBS_CONFIDENCE_THRESHOLD: "10"
      FSBS_LOG_LEVEL: "INFO"
      FSBS_CHECKPOINT_DIR: "/data/checkpoints"
      FSBS_CHECKPOINT_INTERVAL: "60"
    ports:
      - "8082:8082"
    volumes:
      - fsbs-checkpoint-checkout:/data/checkpoints
    depends_on:
      - otel-collector
    mem_limit: 64m

  fsbs-sidecar-productcatalogservice:
