# docker-compose.yaml — Phase 3: FSBS Sidecar in the pipeline
# Microservices → FSBS Sidecar → OTel Collector → Jaeger

services:

  # ============================================================
  # INFRASTRUCTURE
  # ============================================================

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    container_name: jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"
      - "4317"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - LOG_LEVEL=info
    mem_limit: 512m

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    container_name: otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-config/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4318:4318"
    depends_on:
      - jaeger
    mem_limit: 256m

  redis-cart:
    image: redis:7.4-alpine
    container_name: redis-cart
    restart: unless-stopped
    ports:
      - "6379"
    mem_limit: 128m

  # ============================================================
  # FSBS SIDECAR — the intelligent sampling engine          ← NEW
  # ============================================================
  
  fsbs-sidecar:                                              # ← NEW SERVICE
    build:
      context: ./sidecar
      dockerfile: Dockerfile
    container_name: fsbs-sidecar
    restart: unless-stopped
    environment:
      FSBS_SERVICE_NAME: "fsbs-sidecar"
      FSBS_LISTEN_PORT: "4317"
      FSBS_HTTP_PORT: "8081"                                   # ← ADD
      FSBS_FORWARD_ENDPOINT: "otel-collector:4317"
      FSBS_ALPHA: "1.0"
      FSBS_THRESHOLD: "0.5"
      FSBS_CONFIDENCE_THRESHOLD: "10"
      FSBS_METRICS_INTERVAL: "10"
      FSBS_LOG_LEVEL: "INFO"
      FSBS_CHECKPOINT_DIR: "/data/checkpoints"
      FSBS_CHECKPOINT_INTERVAL: "60"
    ports:
      - "4320:4317"     # host:4320 for debugging
      - "8081:8081"                                            # ← ADD
    volumes:
      - fsbs-checkpoint-data:/data/checkpoints
    depends_on:
      - otel-collector
    mem_limit: 256m

  # ============================================================
  # MICROSERVICES — now pointing to fsbs-sidecar
  # ============================================================

  frontend:
    image: gcr.io/google-samples/microservices-demo/frontend:v0.10.1
    container_name: frontend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      ENABLE_TRACING: "1"
      COLLECTOR_SERVICE_ADDR: "fsbs-sidecar:4317"            # ← CHANGED
      PRODUCT_CATALOG_SERVICE_ADDR: "productcatalogservice:3550"
      CURRENCY_SERVICE_ADDR: "currencyservice:7000"
      CART_SERVICE_ADDR: "cartservice:7070"
      RECOMMENDATION_SERVICE_ADDR: "recommendationservice:8080"
      SHIPPING_SERVICE_ADDR: "shippingservice:50051"
      CHECKOUT_SERVICE_ADDR: "checkoutservice:5050"
      AD_SERVICE_ADDR: "adservice:9555"
      SHOPPING_ASSISTANT_SERVICE_ADDR: "shoppingassistantservice:8080"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://fsbs-sidecar:4317"  # ← CHANGED
      OTEL_SERVICE_NAME: "frontend"
    depends_on:
      - fsbs-sidecar                                          # ← CHANGED
      - productcatalogservice
      - cartservice
      - currencyservice
      - recommendationservice
      - shippingservice
      - checkoutservice
      - adservice
    mem_limit: 256m

  productcatalogservice:
    image: gcr.io/google-samples/microservices-demo/productcatalogservice:v0.10.1
    container_name: productcatalogservice
    restart: unless-stopped
    environment:
      PORT: "3550"
      ENABLE_TRACING: "1"
      COLLECTOR_SERVICE_ADDR: "fsbs-sidecar:4317"            # ← CHANGED
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://fsbs-sidecar:4317"  # ← CHANGED
      OTEL_SERVICE_NAME: "productcatalogservice"
    depends_on:
      - fsbs-sidecar                                          # ← CHANGED
    mem_limit: 128m

  cartservice:
    image: gcr.io/google-samples/microservices-demo/cartservice:v0.10.1
    container_name: cartservice
    restart: unless-stopped
    environment:
      ENABLE_TRACING: "1"
      REDIS_ADDR: "redis-cart:6379"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://fsbs-sidecar:4317"  # ← CHANGED
      OTEL_SERVICE_NAME: "cartservice"
    depends_on:
      - redis-cart
      - fsbs-sidecar                                          # ← CHANGED
    mem_limit: 256m

  currencyservice:
    image: gcr.io/google-samples/microservices-demo/currencyservice:v0.10.1
    container_name: currencyservice
    restart: unless-stopped
    environment:
      PORT: "7000"
      ENABLE_TRACING: "1"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://fsbs-sidecar:4317"  # ← CHANGED
      OTEL_SERVICE_NAME: "currencyservice"
      DISABLE_PROFILER: "1"
    depends_on:
      - fsbs-sidecar                                          # ← CHANGED
    mem_limit: 128m

  paymentservice:
    image: gcr.io/google-samples/microservices-demo/paymentservice:v0.10.1
    container_name: paymentservice
    restart: unless-stopped
    environment:
      PORT: "50051"
      ENABLE_TRACING: "1"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://fsbs-sidecar:4317"  # ← CHANGED
      OTEL_SERVICE_NAME: "paymentservice"
      DISABLE_PROFILER: "1"
    depends_on:
      - fsbs-sidecar                                          # ← CHANGED
    mem_limit: 128m

  shippingservice:
    image: gcr.io/google-samples/microservices-demo/shippingservice:v0.10.1
    container_name: shippingservice
    restart: unless-stopped
    environment:
      PORT: "50051"
      ENABLE_TRACING: "1"
      COLLECTOR_SERVICE_ADDR: "fsbs-sidecar:4317"            # ← CHANGED
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://fsbs-sidecar:4317"  # ← CHANGED
      OTEL_SERVICE_NAME: "shippingservice"
    depends_on:
      - fsbs-sidecar                                          # ← CHANGED
    mem_limit: 128m

  emailservice:
    image: gcr.io/google-samples/microservices-demo/emailservice:v0.10.1
    container_name: emailservice
    restart: unless-stopped
    environment:
      PORT: "8080"
      ENABLE_TRACING: "1"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://fsbs-sidecar:4317"  # ← CHANGED
      OTEL_SERVICE_NAME: "emailservice"
    depends_on:
      - fsbs-sidecar                                          # ← CHANGED
    mem_limit: 128m

  checkoutservice:
    image: gcr.io/google-samples/microservices-demo/checkoutservice:v0.10.1
    container_name: checkoutservice
    restart: unless-stopped
    environment:
      PORT: "5050"
      ENABLE_TRACING: "1"
      COLLECTOR_SERVICE_ADDR: "fsbs-sidecar:4317"            # ← CHANGED
      PRODUCT_CATALOG_SERVICE_ADDR: "productcatalogservice:3550"
      SHIPPING_SERVICE_ADDR: "shippingservice:50051"
      PAYMENT_SERVICE_ADDR: "paymentservice:50051"
      EMAIL_SERVICE_ADDR: "emailservice:8080"
      CURRENCY_SERVICE_ADDR: "currencyservice:7000"
      CART_SERVICE_ADDR: "cartservice:7070"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://fsbs-sidecar:4317"  # ← CHANGED
      OTEL_SERVICE_NAME: "checkoutservice"
    depends_on:
      - fsbs-sidecar                                          # ← CHANGED
      - productcatalogservice
      - cartservice
      - currencyservice
      - paymentservice
      - shippingservice
      - emailservice
    mem_limit: 128m

  recommendationservice:
    image: gcr.io/google-samples/microservices-demo/recommendationservice:v0.10.1
    container_name: recommendationservice
    restart: unless-stopped
    environment:
      PORT: "8080"
      ENABLE_TRACING: "1"
      PRODUCT_CATALOG_SERVICE_ADDR: "productcatalogservice:3550"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://fsbs-sidecar:4317"  # ← CHANGED
      OTEL_SERVICE_NAME: "recommendationservice"
      OTEL_PYTHON_LOG_CORRELATION: "true"
    depends_on:
      - fsbs-sidecar                                          # ← CHANGED
      - productcatalogservice
    mem_limit: 256m

  adservice:
    image: gcr.io/google-samples/microservices-demo/adservice:v0.10.1
    container_name: adservice
    restart: unless-stopped
    environment:
      PORT: "9555"
      ENABLE_TRACING: "1"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://fsbs-sidecar:4317"  # ← CHANGED
      OTEL_SERVICE_NAME: "adservice"
    depends_on:
      - fsbs-sidecar                                          # ← CHANGED
    mem_limit: 512m

  # ============================================================
  # LOAD GENERATOR
  # ============================================================

  loadgenerator:
    image: gcr.io/google-samples/microservices-demo/loadgenerator:v0.10.1
    container_name: loadgenerator
    restart: unless-stopped
    environment:
      ENABLE_TRACING: "1"
      FRONTEND_ADDR: "frontend:8080"
      USERS: "10"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://fsbs-sidecar:4317"  # ← CHANGED
      OTEL_SERVICE_NAME: "loadgenerator"
    depends_on:
      - frontend
    mem_limit: 256m

  # ============================================================
  # REWARD SERVICE — closes the learning feedback loop
  # ============================================================

  reward-service:                                              # ← NEW SERVICE
    build:
      context: ./reward-service
      dockerfile: Dockerfile
    container_name: reward-service
    restart: unless-stopped
    environment:
      JAEGER_URL: "http://jaeger:16686"
      SIDECAR_URL: "http://fsbs-sidecar:8081"
      POLL_INTERVAL: "30"
      TRACES_PER_POLL: "30"
      LOOKBACK_SECONDS: "60"
    depends_on:
      - jaeger
      - fsbs-sidecar
    mem_limit: 128m

volumes:
  fsbs-checkpoint-data:
    driver: local